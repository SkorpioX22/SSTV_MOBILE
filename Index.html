<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SSTV Communicator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a12;--panel:#14141f;--border:#2a2a3f;--text:#c8c8d0;--dim:#6a6a7a;--accent:#00cc88;--accent-dim:#007755;--warn:#ffaa44;--danger:#ff4466;--sync:#44aaff;--font:'Courier New',monospace}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:900px;margin:0 auto;padding:8px}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;gap:8px;flex-shrink:0}
header h1{font-size:16px;white-space:nowrap;letter-spacing:1px}
header h1 span{color:var(--accent)}
.mode-group{display:flex;gap:4px;background:var(--bg);padding:3px;border-radius:8px}
.mode-btn{padding:6px 16px;border:none;background:transparent;color:var(--dim);font-family:var(--font);font-size:13px;border-radius:6px;cursor:pointer;transition:all .2s}
.mode-btn.active{background:var(--accent);color:#000;font-weight:700}
.mode-btn:hover:not(.active){color:var(--text)}
.content{display:flex;flex-direction:column;gap:8px;flex:1;margin-top:8px;overflow:hidden}
.panel{display:none;flex-direction:column;gap:8px;flex:1;overflow:hidden}
.panel.active{display:flex}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;overflow:hidden}
.card-title{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row.grow>.col{flex:1}
.col{display:flex;flex-direction:column;gap:6px}
canvas{display:block;width:100%;height:auto;background:#000;border-radius:6px;image-rendering:pixelated}
.canvas-wrap{position:relative;background:#000;border-radius:6px;overflow:hidden}
.canvas-wrap canvas{display:block;width:100%}
.btn{padding:10px 20px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#000;font-weight:700;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-dim);border-color:var(--accent-dim)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#cc3355}
.btn-sm{padding:6px 14px;font-size:12px}
.progress-wrap{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:var(--accent);border-radius:3px;transition:width .2s}
.stat{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border);font-size:12px}
.stat:last-child{border-bottom:none}
.stat-label{color:var(--dim)}
.stat-value{color:var(--text);font-weight:700}
.stat-value.good{color:var(--accent)}
.stat-value.warn{color:var(--warn)}
.stat-value.bad{color:var(--danger)}
#freq-canvas{height:60px;width:100%}
#waterfall{height:80px;width:100%}
input[type="file"]{display:none}
.upload-area{padding:20px;border:2px dashed var(--border);border-radius:8px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.upload-area:hover{border-color:var(--accent);background:rgba(0,204,136,.05)}
.upload-area.dragover{border-color:var(--accent);background:rgba(0,204,136,.1)}
.upload-area svg{width:32px;height:32px;stroke:var(--dim);margin-bottom:8px}
.upload-area p{color:var(--dim);font-size:12px}
.tx-preview{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.flex-ctr{display:flex;align-items:center;gap:6px}
.gap-4{gap:4px}
.mt-4{margin-top:4px}
.text-center{text-align:center}
.text-dim{color:var(--dim)}
.text-accent{color:var(--accent)}
.text-sm{font-size:11px}
.text-xs{font-size:10px}
select{padding:6px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;border-radius:6px}
label{font-size:12px;color:var(--dim)}
.signal-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}
.signal-dot.good{background:var(--accent)}
.signal-dot.warn{background:var(--warn)}
.signal-dot.bad{background:var(--danger)}
#rx-canvas{aspect-ratio:4/3;max-height:300px;width:100%}
.overflow-y{overflow-y:auto;flex:1;min-height:0}
@media(max-width:600px){
  #app{padding:4px}
  header h1{font-size:13px}
  .mode-btn{padding:5px 12px;font-size:12px}
  .card{padding:8px}
  .grid-2{grid-template-columns:1fr}
  #rx-canvas{max-height:200px}
  .tx-preview{grid-template-columns:1fr}
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.flash{animation:flash .3s}
@keyframes flash{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
#sync-bar{display:flex;gap:2px;align-items:flex-end;height:30px}
.sync-seg{flex:1;border-radius:2px 2px 0 0;transition:all .3s}
</style>
</head>
<body>
<div id="app">
<header>
<h1><span>◉</span> SSTV</h1>
<div class="mode-group">
<button class="mode-btn active" data-mode="tx" id="btn-tx">TX</button>
<button class="mode-btn" data-mode="rx" id="btn-rx">RX</button>
</div>
</header>

<div class="content">
<!-- TRANSMIT PANEL -->
<div id="tx-panel" class="panel active">
<div class="card">
<div class="card-title">Image</div>
<div class="upload-area" id="upload-area">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
<p>Tap to upload image</p>
</div>
<input type="file" id="file-input" accept="image/*">
<div class="tx-preview" id="preview-area" style="display:none">
<div><div class="card-title">Source</div><div class="canvas-wrap"><canvas id="src-canvas"></canvas></div></div>
<div><div class="card-title">SSTV (<span id="res-label">128x96</span>)</div><div class="canvas-wrap"><canvas id="sstv-canvas"></canvas></div></div>
</div>
</div>

<div class="row">
<div class="col card" style="flex:1">
<div class="card-title">Settings</div>
<div class="row gap-4" style="flex-wrap:wrap;align-items:center">
<label><input type="radio" name="mode" value="GRAYSCALE" checked> Grayscale</label>
<label><input type="radio" name="mode" value="COLOR"> Color</label>
<select id="res-select">
<option value="64x48">64x48 (fast)</option>
<option value="128x96" selected>128x96 (standard)</option>
<option value="160x120">160x120 (HD)</option>
</select>
</div>
</div>
<div class="col card" style="flex:0 0 auto">
<div class="card-title">Output</div>
<div class="row gap-4">
<button class="btn btn-primary" id="btn-transmit">▶ Transmit</button>
<button class="btn btn-danger" id="btn-stop-tx" style="display:none">■ Stop</button>
</div>
</div>
</div>

<div class="card" id="tx-progress-card" style="display:none">
<div class="card-title">Transmission</div>
<div class="progress-wrap"><div class="progress-bar" id="tx-progress"></div></div>
<div class="row text-sm text-dim" style="justify-content:space-between;margin-top:4px">
<span id="tx-status">Preparing...</span>
<span id="tx-time">0:00</span>
</div>
</div>

<div class="card" style="flex:1;min-height:0">
<div class="card-title">Frequency Monitor</div>
<canvas id="tx-freq-canvas"></canvas>
</div>
</div>

<!-- RECEIVE PANEL -->
<div id="rx-panel" class="panel">
<div class="row">
<div class="col card" style="flex:2">
<div class="card-title">Decoded Image</div>
<div class="canvas-wrap"><canvas id="rx-canvas"></canvas></div>
<div class="text-xs text-dim text-center mt-4" id="rx-line-info">Waiting for signal...</div>
</div>
<div class="col card" style="flex:1">
<div class="card-title">Status</div>
<div class="stat"><span class="stat-label">Signal</span><span class="stat-value" id="rx-signal">-- dB</span></div>
<div class="stat"><span class="stat-label">Freq</span><span class="stat-value" id="rx-freq">-- Hz</span></div>
<div class="stat"><span class="stat-label">State</span><span class="stat-value" id="rx-state">IDLE</span></div>
<div class="stat"><span class="stat-label">Line</span><span class="stat-value" id="rx-line">0 / 0</span></div>
<div class="stat"><span class="stat-label">Pixels</span><span class="stat-value" id="rx-pixels">0 / 0</span></div>
<div class="stat"><span class="stat-label">Sync</span><span class="stat-value" id="rx-sync">--</span></div>
<div class="stat"><span class="stat-label">Confidence</span><span class="stat-value" id="rx-confidence">--%</span></div>
<div class="stat"><span class="stat-label">Mode</span><span class="stat-value" id="rx-mode">--</span></div>
</div>
</div>

<div class="row">
<div class="col card" style="flex:1">
<div class="card-title">Sync Detection</div>
<div id="sync-bar"></div>
</div>
        <div class="col card" style="flex:1">
        <div class="card-title">Action</div>
        <div class="row gap-4" style="margin-bottom:6px">
        <button class="btn btn-primary" id="btn-receive">▶ Listen</button>
        <button class="btn btn-danger" id="btn-stop-rx" style="display:none">■ Stop</button>
        <button class="btn btn-sm" id="btn-save-rx" disabled>Save</button>
        </div>
        <div class="flex-ctr" style="gap:8px">
        <label style="font-size:11px">RX Mode:</label>
        <select id="rx-mode-select" style="font-size:11px;padding:3px 6px">
        <option value="AUTO">Auto</option>
        <option value="GRAYSCALE">Grayscale</option>
        <option value="COLOR">Color</option>
        </select>
        </div>
        </div>
</div>

<div class="card" style="flex:1;min-height:0">
<div class="card-title">Frequency Monitor</div>
<canvas id="rx-freq-canvas"></canvas>
</div>
</div>
</div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CFG = {
  sr: 44100,
  syncFreq: 1200,
  syncMs: 15,
  porchFreq: 1500,
  porchMs: 3,
  blackFreq: 1500,
  whiteFreq: 2300,
  leaderFreq: 1900,
  leaderMs: 1000,
  pixelMs: 2,
  visMode: { gray: 1800, color: 2000 },
  visMs: 50,
  lineEndMs: 2
};

// ============================================================
// AUDIO HELPERS
// ============================================================
class AudioGen {
  static tone(len, freq, sr) {
    const n = Math.floor(len * sr);
    const buf = new Float32Array(n);
    for (let i = 0; i < n; i++) buf[i] = Math.sin(2 * Math.PI * freq * i / sr);
    return buf;
  }
  static fill(dst, off, src) { dst.set(src, off); return off + src.length }
}

// ============================================================
// SSTV ENCODER
// ============================================================
class SSTVEncoder {
  constructor() { this.ctx = null }

  encode(imageData, w, h, mode) {
    const sr = CFG.sr;
    const pixelSamp = Math.floor(CFG.pixelMs * sr / 1000);
    const syncSamp = Math.floor(CFG.syncMs * sr / 1000);
    const porchSamp = Math.floor(CFG.porchMs * sr / 1000);
    const leaderSamp = Math.floor(CFG.leaderMs * sr / 1000);
    const visSamp = Math.floor(CFG.visMs * sr / 1000);
    const endSamp = Math.floor(CFG.lineEndMs * sr / 1000);

    const channels = mode === 'GRAYSCALE' ? 1 : 3;
    const totalLines = h * channels;
    const lineSamp = syncSamp + porchSamp + w * pixelSamp + endSamp;
    const totalSamp = leaderSamp + syncSamp + porchSamp + visSamp + syncSamp + porchSamp + totalLines * lineSamp;
    const totalSec = totalSamp / sr;

    const buf = new Float32Array(totalSamp);
    let off = 0;

    // Leader
    off = AudioGen.fill(buf, off, AudioGen.tone(CFG.leaderMs / 1000, CFG.leaderFreq, sr));
    // VIS sync
    off = AudioGen.fill(buf, off, AudioGen.tone(CFG.syncMs / 1000, CFG.syncFreq, sr));
    // VIS porch
    off = AudioGen.fill(buf, off, AudioGen.tone(CFG.porchMs / 1000, CFG.porchFreq, sr));
    // VIS mode tone
    const modeFreq = mode === 'GRAYSCALE' ? CFG.visMode.gray : CFG.visMode.color;
    off = AudioGen.fill(buf, off, AudioGen.tone(CFG.visMs / 1000, modeFreq, sr));
    // VIS sync 2
    off = AudioGen.fill(buf, off, AudioGen.tone(CFG.syncMs / 1000, CFG.syncFreq, sr));
    // VIS porch 2
    off = AudioGen.fill(buf, off, AudioGen.tone(CFG.porchMs / 1000, CFG.porchFreq, sr));

    // Lines
    for (let li = 0; li < totalLines; li++) {
      const yi = mode === 'GRAYSCALE' ? li : (li % h);
      const ch = mode === 'GRAYSCALE' ? null : Math.floor(li / h);

      off = AudioGen.fill(buf, off, AudioGen.tone(CFG.syncMs / 1000, CFG.syncFreq, sr));
      off = AudioGen.fill(buf, off, AudioGen.tone(CFG.porchMs / 1000, CFG.porchFreq, sr));

      for (let x = 0; x < w; x++) {
        let val;
        if (mode === 'GRAYSCALE') {
          const idx = (li * w + x) * 4;
          val = 0.299 * imageData[idx] + 0.587 * imageData[idx + 1] + 0.114 * imageData[idx + 2];
        } else {
          const idx = (yi * w + x) * 4 + ch;
          val = imageData[idx];
        }
        const freq = CFG.blackFreq + (val / 255) * (CFG.whiteFreq - CFG.blackFreq);
        off = AudioGen.fill(buf, off, AudioGen.tone(CFG.pixelMs / 1000, freq, sr));
      }
      off = AudioGen.fill(buf, off, AudioGen.tone(CFG.lineEndMs / 1000, CFG.porchFreq, sr));
    }
    return { buffer: buf, duration: totalSec, totalLines };
  }
}

// ============================================================
// SSTV DECODER (ScriptProcessor + corrected zero-crossing)
// ============================================================
class SSTVDecoder {
  constructor(w, h, sr) {
    this.w = w; this.h = h;
    this.sr = sr || 44100;
    this.measSamp = 512;
    this.strideSamp = 88;
    this.strideMs = this.strideSamp / this.sr * 1000;

    this.state = 'IDLE'; this.active = false;
    this.leaderMs = 0; this.lineIdx = 0; this.pixelIdx = 0;
    this.lineBuf = []; this.mode = null;
    this.txMode = 'GRAYSCALE'; this.allowVisOverride = true;
    this.freqHist = []; this.freqAccum = [];
    this.lastActivity = Date.now(); this.timeoutMs = 10000;
    this.syncTimings = []; this.syncQuality = 0;
    this.syncCount = 0; this.porchCount = 0;
    this.totalFrames = 0; this.signalAmp = 0;
    this.currentFreq = 0; this.currentAmp = 0;

    this.img = [];
    this.online = null; this.onprogress = null;
    this.onstate = null; this.onsignal = null;
    this.reset();
  }

  reset() {
    this.state = 'IDLE'; this.leaderMs = 0;
    this.lineIdx = 0; this.pixelIdx = 0;
    this.lineBuf = []; this.mode = null;
    this.freqHist = []; this.freqAccum = [];
    this.syncCount = 0; this.porchCount = 0;
    this.signalAmp = 0; this.totalFrames = 0;
    this.lastActivity = Date.now(); this.syncTimings = [];
    this.img = [];
    for (let y = 0; y < this.h; y++) {
      this.img[y] = [];
      for (let x = 0; x < this.w; x++) this.img[y][x] = { r: 0, g: 0, b: 0, conf: 0 };
    }
  }

  totalLines() { return this.txMode === 'GRAYSCALE' ? this.h : this.h * 3; }
  start() { this.active = true; this.reset(); }
  stop() { this.active = false; }

  process(samples) {
    if (!this.active) return;
    this.freqAccum.push(...samples);
    while (this.freqAccum.length >= this.measSamp) {
      const buf = this.freqAccum.slice(0, this.measSamp);
      this.measure(buf);
      this.freqAccum.splice(0, this.strideSamp);
    }
  }

  measure(buf) {
    let zc = 0;
    let amp = 0;
    for (let i = 1; i < buf.length; i++) {
      if (buf[i - 1] < 0 && buf[i] >= 0) zc++;
      const a = Math.abs(buf[i]);
      if (a > amp) amp = a;
    }
    this.currentFreq = zc * this.sr / this.measSamp;
    this.currentAmp = amp;
    this.signalAmp = this.signalAmp * 0.9 + amp * 0.1;
    this.freqHist.push(this.currentFreq);
    if (this.freqHist.length > 3) this.freqHist.shift();
    this.totalFrames++;
    if (amp < 0.005 && this.state === 'IDLE') {
      if (this.onsignal) this.onsignal(this.signalData());
      return;
    }
    this.stateMachine();
    if (this.onsignal) this.onsignal(this.signalData());
  }

  get sf() {
    const h = this.freqHist;
    return h.length ? h.reduce((a, b) => a + b, 0) / h.length : 0;
  }

  signalData() {
    return {
      freq: this.currentFreq, amp: this.signalAmp, sf: this.sf,
      state: this.state, line: this.lineIdx, pixel: this.pixelIdx
    };
  }

  inRange(v, lo, hi) { return v >= lo && v <= hi; }

  stateMachine() {
    const sf = this.sf;
    switch (this.state) {
      case 'IDLE': {
        if (this.inRange(sf, 1800, 2000)) {
          this.leaderMs += this.strideMs;
          if (this.leaderMs > 400) {
            this.state = 'LEADER';
            this.setSignal('Leader');
          }
        } else {
          this.leaderMs = Math.max(0, this.leaderMs - this.strideMs * 3);
        }
        break;
      }
      case 'LEADER': {
        if (this.inRange(sf, 1100, 1300)) {
          this.state = 'VIS_SYNC';
          this.syncCount = 1;
          this.setSignal('VIS sync');
        } else if (this.inRange(sf, 1400, 2400)) {
        } else if (this.signalAmp < 0.01) {
          this.state = 'IDLE'; this.leaderMs = 0;
        }
        break;
      }
      case 'VIS_SYNC': {
        this.syncCount++;
        if (this.syncCount >= 9) {
          this.state = 'VIS_PORCH';
          this.syncCount = 0;
          this.setSignal('VIS porch');
        }
        break;
      }
      case 'VIS_PORCH': {
        if (this.inRange(sf, 1700, 1950)) {
          if (this.allowVisOverride !== false) { this.txMode = 'GRAYSCALE'; }
          this.mode = 'GRAYSCALE';
          this.state = 'VIS_MODE';
          this.setSignal('Gray');
          this.syncCount = 0;
        } else if (this.inRange(sf, 1950, 2100)) {
          if (this.allowVisOverride !== false) { this.txMode = 'COLOR'; }
          this.mode = 'COLOR';
          this.state = 'VIS_MODE';
          this.setSignal('Color');
          this.syncCount = 0;
        } else if (this.signalAmp < 0.01) {
          this.state = 'IDLE'; this.leaderMs = 0;
        }
        break;
      }
      case 'VIS_MODE': {
        if (this.inRange(sf, 1100, 1300)) {
          this.syncCount++;
          if (this.syncCount >= 9) {
            this.state = 'LINE_WAIT';
            this.syncCount = 0;
            this.lineIdx = 0; this.pixelIdx = 0;
            this.lineBuf = [];
            this.setSignal('Receiving...');
          }
        } else if (this.inRange(sf, 1800, 2100)) {
        } else if (this.signalAmp < 0.01) {
          this.state = 'IDLE'; this.leaderMs = 0;
        } else {
          this.syncCount = 0;
        }
        break;
      }
      case 'LINE_WAIT': {
        if (this.lineIdx > 0 && (Date.now() - this.lastActivity) > this.timeoutMs) {
          this.state = 'DONE'; this.active = false;
          this.setSignal('Complete');
          this.progress(); break;
        }
        if (this.inRange(sf, 1100, 1300)) {
          this.syncCount++;
          if (this.syncCount >= 2) {
            this.state = 'LINE_SYNC';
            this.syncCount = 0;
            this.syncTimings.push(Date.now());
            if (this.syncTimings.length > 10) this.syncTimings.shift();
            this.progress();
          }
        } else {
          this.syncCount = 0;
        }
        break;
      }
      case 'LINE_SYNC': {
        this.syncCount++;
        if (this.syncCount >= 9) {
          this.state = 'LINE_DATA';
          this.pixelIdx = 0;
          this.lineBuf = [];
          this.syncCount = 0;
        }
        break;
      }
      case 'LINE_DATA': {
        if (this.pixelIdx < this.w) {
          const clamped = Math.max(CFG.blackFreq, Math.min(CFG.whiteFreq, this.currentFreq));
          const v = Math.round(((clamped - CFG.blackFreq) / (CFG.whiteFreq - CFG.blackFreq)) * 255);
          this.lineBuf.push({ val: v, conf: Math.min(1, this.signalAmp * 3) });
          this.pixelIdx++;
          if (this.pixelIdx >= this.w) this.state = 'LINE_DONE';
        }
        break;
      }
      case 'LINE_DONE': {
        this.storeLine();
        this.lineIdx++;
        this.lineBuf = [];
        this.lastActivity = Date.now();
        if (this.lineIdx >= this.totalLines()) {
          this.state = 'DONE'; this.active = false;
          this.setSignal('Complete!');
        } else {
          this.state = 'LINE_WAIT';
        }
        this.progress();
        break;
      }
      case 'DONE': break;
    }
  }

  storeLine() {
    if (this.txMode === 'GRAYSCALE') {
      for (let x = 0; x < this.w && x < this.lineBuf.length; x++) {
        const v = this.lineBuf[x].val;
        this.img[this.lineIdx][x] = { r: v, g: v, b: v, conf: this.lineBuf[x].conf };
      }
      if (this.online) this.online(this.lineIdx, this.img[this.lineIdx], 'gray');
    } else {
      const ch = Math.floor(this.lineIdx / this.h);
      const yi = this.lineIdx % this.h;
      const key = ['r', 'g', 'b'][ch];
      for (let x = 0; x < this.w && x < this.lineBuf.length; x++) {
        this.img[yi][x][key] = this.lineBuf[x].val;
        this.img[yi][x].conf = Math.max(this.img[yi][x].conf || 0, this.lineBuf[x].conf);
      }
      if (this.online && ch === 2) this.online(yi, this.img[yi], 'rgb');
    }
  }

  progress() {
    if (this.onprogress) this.onprogress({
      line: this.lineIdx, total: this.totalLines(),
      pct: this.totalLines() > 0 ? Math.round(this.lineIdx / this.totalLines() * 100) : 0
    });
  }
  setSignal(msg) { if (this.onstate) this.onstate(msg); }

  getConfidence() {
    let total = 0, count = 0;
    for (let y = 0; y < this.h; y++)
      for (let x = 0; x < this.w; x++) { total += this.img[y][x].conf || 0; count++; }
    return count > 0 ? Math.round(total / count * 100) : 0;
  }

  getSyncRate() {
    if (this.syncTimings.length < 2) return 0;
    const intervals = [];
    for (let i = 1; i < this.syncTimings.length; i++)
      intervals.push(this.syncTimings[i] - this.syncTimings[i - 1]);
    const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    const expected = CFG.syncMs + CFG.porchMs + this.w * CFG.pixelMs + CFG.lineEndMs;
    const err = Math.abs(avg - expected) / expected;
    return Math.max(0, Math.round((1 - err) * 100));
  }
}

// ============================================================
// APP
// ============================================================
const App = {
  mode: 'tx',
  encoder: new SSTVEncoder(),
  decoder: null,
  txCtx: null,
  rxCtx: null,
  micStream: null,
  srcNode: null,
  scriptNode: null,
  rxAnalyser: null,
  txAnalyser: null,
  transmitting: false,
  receiving: false,
  txAnimId: null,
  rxAnimId: null,

  srcImage: null,
  sstvData: null,
  sstvW: 128,
  sstvH: 96,
  txMode: 'GRAYSCALE',
  txLines: 0,
  txTotalLines: 0,

  init() {
    this.bindUI();
    this.setupCanvases();
    this.setupFreqCanvas('tx-freq-canvas');
    this.setupFreqCanvas('rx-freq-canvas');
    this.switchMode('tx');
  },

  bindUI() {
    // Mode toggle
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.onclick = () => this.switchMode(b.dataset.mode);
    });
    // File upload
    const ua = document.getElementById('upload-area');
    ua.onclick = () => document.getElementById('file-input').click();
    ua.ondragover = e => { e.preventDefault(); ua.classList.add('dragover'); };
    ua.ondragleave = () => ua.classList.remove('dragover');
    ua.ondrop = e => { e.preventDefault(); ua.classList.remove('dragover'); if (e.dataTransfer.files[0]) this.loadFile(e.dataTransfer.files[0]); };
    document.getElementById('file-input').onchange = e => { if (e.target.files[0]) this.loadFile(e.target.files[0]); };
    // Res select
    document.getElementById('res-select').onchange = e => {
      const [w, h] = e.target.value.split('x').map(Number);
      this.sstvW = w; this.sstvH = h;
      document.getElementById('res-label').textContent = `${w}x${h}`;
      this.renderPreview();
    };
    // Mode radio
    document.querySelectorAll('input[name="mode"]').forEach(r => {
      r.onchange = () => {
        this.txMode = r.value;
        this.renderPreview();
      };
    });
    // TX buttons
    document.getElementById('btn-transmit').onclick = () => this.startTransmit();
    document.getElementById('btn-stop-tx').onclick = () => this.stopTransmit();
    // RX buttons
    document.getElementById('btn-receive').onclick = () => this.startReceive();
    document.getElementById('btn-stop-rx').onclick = () => this.stopReceive();
    document.getElementById('btn-save-rx').onclick = () => this.saveRXImage();
  },

  setupCanvases() {
    for (const id of ['src-canvas', 'sstv-canvas', 'rx-canvas']) {
      const c = document.getElementById(id);
      const p = c.parentElement;
      c.width = 320; c.height = 240;
    }
  },

  setupFreqCanvas(id) {
    const c = document.getElementById(id);
    const r = () => { c.width = c.clientWidth * devicePixelRatio; c.height = c.clientHeight * devicePixelRatio; };
    r(); window.addEventListener('resize', r);
  },

  switchMode(m) {
    this.mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    document.getElementById('tx-panel').classList.toggle('active', m === 'tx');
    document.getElementById('rx-panel').classList.toggle('active', m === 'rx');
    if (m === 'rx') { this.drawFreqWaterfall('rx-freq-canvas', new Float32Array(512).fill(-100)); }
    if (m === 'tx') { this.drawFreqWaterfall('tx-freq-canvas', new Float32Array(512).fill(-100)); }
    if (m === 'rx' && !this.receiving) this.drawRXCanvas();
  },

  // ============================================================
  // IMAGE LOADING
  // ============================================================
  loadFile(file) {
    const img = new Image();
    img.onload = () => {
      this.srcImage = img;
      this.renderPreview();
      document.getElementById('preview-area').style.display = 'grid';
      document.getElementById('upload-area').style.display = 'none';
    };
    img.src = URL.createObjectURL(file);
  },

  renderPreview() {
    if (!this.srcImage) return;
    const w = this.sstvW, h = this.sstvH;
    // Source canvas (fit to container)
    const sc = document.getElementById('src-canvas');
    const sp = sc.parentElement;
    sc.width = this.srcImage.naturalWidth;
    sc.height = this.srcImage.naturalHeight;
    const sctx = sc.getContext('2d');
    sctx.drawImage(this.srcImage, 0, 0);
    // SSTV sized canvas
    const cc = document.getElementById('sstv-canvas');
    cc.width = w; cc.height = h;
    const cctx = cc.getContext('2d');
    cctx.imageSmoothingEnabled = false;
    cctx.drawImage(this.srcImage, 0, 0, w, h);
    // Extract pixel data
    const data = cctx.getImageData(0, 0, w, h).data;
    this.sstvData = data;
  },

  // ============================================================
  // TRANSMIT
  // ============================================================
  startTransmit() {
    if (this.transmitting) return;
    if (!this.srcImage) { alert('Upload an image first'); return; }
    this.renderPreview();

    const btn = document.getElementById('btn-transmit');
    const stopBtn = document.getElementById('btn-stop-tx');
    const progCard = document.getElementById('tx-progress-card');
    const progBar = document.getElementById('tx-progress');
    const statusEl = document.getElementById('tx-status');
    const timeEl = document.getElementById('tx-time');

    btn.style.display = 'none';
    stopBtn.style.display = 'inline-block';
    progCard.style.display = 'block';
    progBar.style.width = '0%';
    statusEl.textContent = 'Encoding...';
    timeEl.textContent = '0:00';

    // Encode offline
    const result = this.encoder.encode(this.sstvData, this.sstvW, this.sstvH, this.txMode);
    const duration = result.duration;
    this.txTotalLines = result.totalLines;

    statusEl.textContent = 'Playing...';
    timeEl.textContent = `0:00 / ${Math.floor(duration / 60)}:${String(Math.floor(duration % 60)).padStart(2, '0')}`;

    // Create AudioContext for playback
    if (this.txCtx) this.txCtx.close();
    this.txCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Create buffer
    const audioBuf = this.txCtx.createBuffer(1, result.buffer.length, CFG.sr);
    audioBuf.getChannelData(0).set(result.buffer);

    // Wire up: source → analyser → gain → destination
    const source = this.txCtx.createBufferSource();
    source.buffer = audioBuf;
    const analyser = this.txCtx.createAnalyser();
    analyser.fftSize = 2048;
    const gain = this.txCtx.createGain();
    gain.gain.value = 0.8;
    source.connect(analyser);
    analyser.connect(gain);
    gain.connect(this.txCtx.destination);

    this.txAnalyser = analyser;
    this.transmitting = true;
    this.txLines = 0;

    source.onended = () => {
      if (this.transmitting) {
        this.transmitting = false;
        statusEl.textContent = 'Complete';
        progBar.style.width = '100%';
        btn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        if (this.txAnimId) { cancelAnimationFrame(this.txAnimId); this.txAnimId = null; }
      }
    };

    // Progress tracking via time
    const startTime = this.txCtx.currentTime;
    const updateProgress = () => {
      if (!this.transmitting) return;
      const elapsed = this.txCtx.currentTime - startTime;
      const pct = Math.min(100, Math.round((elapsed / duration) * 100));
      progBar.style.width = pct + '%';
      const eMin = Math.floor(elapsed / 60);
      const eSec = Math.floor(elapsed % 60);
      timeEl.textContent = `${eMin}:${String(eSec).padStart(2, '0')} / ${Math.floor(duration / 60)}:${String(Math.floor(duration % 60)).padStart(2, '0')}`;
      if (pct < 100) { this.txAnimId = requestAnimationFrame(updateProgress); }
    };

    source.start();
    updateProgress();
    this.startTXFreqMonitor();

    // Resume AudioContext if suspended (autoplay policy)
    if (this.txCtx.state === 'suspended') this.txCtx.resume();
  },

  stopTransmit() {
    if (!this.transmitting) return;
    this.transmitting = false;
    if (this.txCtx) { this.txCtx.close(); this.txCtx = null; }
    if (this.txAnimId) { cancelAnimationFrame(this.txAnimId); this.txAnimId = null; }
    document.getElementById('btn-transmit').style.display = 'inline-block';
    document.getElementById('btn-stop-tx').style.display = 'none';
    document.getElementById('tx-status').textContent = 'Stopped';
  },

  startTXFreqMonitor() {
    const canvas = document.getElementById('tx-freq-canvas');
    if (!this.txAnalyser) return;
    const data = new Uint8Array(this.txAnalyser.frequencyBinCount);
    const draw = () => {
      if (!this.transmitting || !this.txAnalyser) return;
      this.txAnalyser.getByteFrequencyData(data);
      App.drawFreqBars('tx-freq-canvas', data, CFG.sr, this.txAnalyser.fftSize);
      requestAnimationFrame(draw);
    };
    draw();
  },

  // ============================================================
  // RECEIVE
  // ============================================================
  startReceive() {
    if (this.receiving) return;

    const btn = document.getElementById('btn-receive');
    const stopBtn = document.getElementById('btn-stop-rx');

    btn.style.display = 'none';
    stopBtn.style.display = 'inline-block';
    document.getElementById('btn-save-rx').disabled = true;

    // Create AudioContext
    if (this.rxCtx) this.rxCtx.close();
    this.rxCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Get mic
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } })
      .then(stream => {
        this.micStream = stream;
        const src = this.rxCtx.createMediaStreamSource(stream);

        // Analyser for visualization only
        this.rxAnalyser = this.rxCtx.createAnalyser();
        this.rxAnalyser.fftSize = 2048;
        src.connect(this.rxAnalyser);

        // Decoder (raw samples via ScriptProcessorNode)
        this.decoder = new SSTVDecoder(this.sstvW, this.sstvH, this.rxCtx.sampleRate);
        const rxModeSelect = document.getElementById('rx-mode-select');
        const userRxMode = rxModeSelect.value;
        this.decoder.txMode = userRxMode === 'AUTO' ? 'GRAYSCALE' : userRxMode;
        this.decoder.allowVisOverride = (userRxMode === 'AUTO');
        this.decoder.start();

        this.decoder.online = (y, pixels, type) => {
          this.renderDecodedLine(y, pixels, type);
        };
        this.decoder.onprogress = (p) => {
          document.getElementById('rx-line').textContent = `${p.line} / ${p.total}`;
          document.getElementById('rx-line-info').textContent = `Line ${p.line} of ${p.total} (${p.pct}%)`;
        };
        this.decoder.onstate = (msg) => {
          document.getElementById('rx-state').textContent = msg;
          if (msg === 'Complete!' || msg === 'Complete') {
            document.getElementById('btn-save-rx').disabled = false;
            document.getElementById('rx-line-info').textContent = 'Transmission complete!';
          }
        };
        this.decoder.onsignal = (s) => {
          document.getElementById('rx-signal').textContent = `${Math.round(s.amp * 1000)} mV`;
          document.getElementById('rx-freq').textContent = `${Math.round(s.freq)} Hz`;
          document.getElementById('rx-pixels').textContent = `${s.pixel} / ${this.sstvW}`;
        };

        // ScriptProcessorNode for raw audio access
        this.scriptNode = this.rxCtx.createScriptProcessor(4096, 1, 1);
        src.connect(this.scriptNode);
        this.scriptNode.connect(this.rxCtx.destination);
        this.scriptNode.onaudioprocess = (e) => {
          if (!this.receiving) return;
          this.decoder.process(e.inputBuffer.getChannelData(0));
          this.updateRXStats();
        };

        this.receiving = true;
        this.drawRXCanvas();
        this.startRXFreqMonitor();
        this.updateSyncBar(new Float32Array(16).fill(0));
        this.setRXState('Listening...');
      })
      .catch(err => {
        alert('Microphone access required for receive mode. Error: ' + err.message);
        btn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
      });
  },

  stopReceive() {
    if (!this.receiving) return;
    this.receiving = false;
    if (this.decoder) { this.decoder.stop(); }
    if (this.scriptNode) {
      try { this.scriptNode.disconnect(); } catch (e) {}
      this.scriptNode = null;
    }
    if (this.micStream) {
      this.micStream.getTracks().forEach(t => t.stop());
      this.micStream = null;
    }
    if (this.rxCtx) { this.rxCtx.close(); this.rxCtx = null; }
    if (this.rxAnimId) { cancelAnimationFrame(this.rxAnimId); this.rxAnimId = null; }
    document.getElementById('btn-receive').style.display = 'inline-block';
    document.getElementById('btn-stop-rx').style.display = 'none';
    document.getElementById('btn-save-rx').disabled = false;
    this.setRXState('Stopped');
  },

  renderDecodedLine(y, pixels, type) {
    const canvas = document.getElementById('rx-canvas');
    const ctx = canvas.getContext('2d');
    const iw = this.sstvW, ih = this.sstvH;
    if (canvas.width !== iw || canvas.height !== ih) {
      canvas.width = iw; canvas.height = ih;
    }
    const imgData = ctx.getImageData(0, 0, iw, ih);
    const d = imgData.data;
    if (type === 'gray' || type === 'rgb') {
      for (let x = 0; x < iw && x < pixels.length; x++) {
        const idx = (y * iw + x) * 4;
        d[idx] = pixels[x].r;
        d[idx + 1] = pixels[x].g;
        d[idx + 2] = pixels[x].b;
        d[idx + 3] = 255;
      }
    } else {
      const ch = ['r', 'g', 'b'].indexOf(type);
      for (let x = 0; x < iw && x < pixels.length; x++) {
        const idx = (y * iw + x) * 4 + ch;
        d[idx] = pixels[x].val;
        d[idx + 3] = 255;
      }
    }
    ctx.putImageData(imgData, 0, 0);

    // Update confidence in stats
    if (this.decoder) {
      const conf = this.decoder.getConfidence();
      document.getElementById('rx-confidence').textContent = conf + '%';
      document.getElementById('rx-confidence').className = 'stat-value' + (conf > 70 ? ' good' : conf > 40 ? ' warn' : ' bad');
    }
    const syncRate = this.decoder ? this.decoder.getSyncRate() : 0;
    document.getElementById('rx-sync').textContent = syncRate + '%';
    document.getElementById('rx-sync').className = 'stat-value' + (syncRate > 70 ? ' good' : syncRate > 40 ? ' warn' : ' bad');
  },

  drawRXCanvas() {
    const canvas = document.getElementById('rx-canvas');
    const ctx = canvas.getContext('2d');
    const iw = this.sstvW, ih = this.sstvH;
    canvas.width = iw; canvas.height = ih;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, iw, ih);
    // Draw grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= iw; x += 8) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ih); ctx.stroke(); }
    for (let y = 0; y <= ih; y += 8) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(iw, y); ctx.stroke(); }
  },

  updateRXStats() {
    if (!this.decoder) return;
    const el = document.getElementById('rx-mode');
    if (this.decoder.mode) el.textContent = this.decoder.mode;
    const syncRate = this.decoder.getSyncRate();
    this.updateSyncBar(this.decoder.syncQuality > 0.5 ? new Float32Array(16).fill(syncRate / 100) : new Float32Array(16).fill(0));
  },

  updateSyncBar(values) {
    const bar = document.getElementById('sync-bar');
    bar.innerHTML = '';
    for (let i = 0; i < 16; i++) {
      const seg = document.createElement('div');
      seg.className = 'sync-seg';
      const v = values && i < values.length ? values[i] : 0;
      const h = Math.round(v * 28);
      seg.style.height = Math.max(2, h) + 'px';
      const hue = 120 * v;
      seg.style.background = `hsl(${hue}, 80%, ${40 + 30 * v}%)`;
      bar.appendChild(seg);
    }
  },

  setRXState(msg) {
    document.getElementById('rx-state').textContent = msg;
    document.getElementById('rx-line-info').textContent = msg;
  },

  saveRXImage() {
    const canvas = document.getElementById('rx-canvas');
    const link = document.createElement('a');
    link.download = 'sstv-received.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  },

  // ============================================================
  // FREQUENCY VISUALIZATION
  // ============================================================
  freqWaterfalls: { 'tx-freq-canvas': [], 'rx-freq-canvas': [] },
  freqBins: {},

  drawFreqBars(id, data, sr, fftSize) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = devicePixelRatio || 1;
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const binHz = sr / fftSize;
    const startBin = Math.floor(800 / binHz);
    const endBin = Math.floor(2800 / binHz);
    const bins = data.slice(startBin, endBin);
    const barW = w / bins.length;

    // Dark background
    ctx.fillStyle = '#080810';
    ctx.fillRect(0, 0, w, h);

    // Markers at 1200, 1500, 1900, 2300
    const markers = [1200, 1500, 1900, 2300];
    ctx.font = `${10 * dpr}px monospace`;
    ctx.fillStyle = 'rgba(100,100,120,0.5)';
    for (const m of markers) {
      const mx = ((m - 800) / 2000) * w;
      ctx.fillRect(mx, 0, 1 * dpr, h);
      ctx.fillText(m + 'Hz', mx + 2 * dpr, 12 * dpr);
    }

    // Bars
    const maxVal = 255;
    for (let i = 0; i < bins.length; i++) {
      const val = bins[i] / maxVal;
      const bw = Math.max(1, barW - 0.5);
      const bh = val * h;
      const x = i * barW;
      // Color from green to red based on frequency
      const freq = 800 + (i / bins.length) * 2000;
      let hue;
      if (freq < 1200) hue = 240;
      else if (freq < 1500) hue = 200;
      else if (freq < 1900) hue = 140;
      else if (freq < 2300) hue = 40;
      else hue = 0;
      ctx.fillStyle = `hsl(${hue}, 90%, ${40 + 30 * val}%)`;
      ctx.fillRect(x, h - bh, bw, bh);
    }
  },

  startRXFreqMonitor() {
    const canvas = document.getElementById('rx-freq-canvas');
    const ctx = canvas.getContext('2d');
    this.freqWaterfalls['rx-freq-canvas'] = [];
    const waterfallLines = 120;

    const draw = () => {
      if (!this.receiving || !this.rxAnalyser) return;
      const data = new Uint8Array(this.rxAnalyser.frequencyBinCount);
      this.rxAnalyser.getByteFrequencyData(data);

      const sr = this.rxCtx ? this.rxCtx.sampleRate : CFG.sr;
      const fftSize = this.rxAnalyser.fftSize;
      const binHz = sr / fftSize;
      const startBin = Math.floor(800 / binHz);
      const endBin = Math.floor(2800 / binHz);
      const bins = data.slice(startBin, endBin);

      // Add to waterfall
      this.freqWaterfalls['rx-freq-canvas'].push(bins.slice());
      if (this.freqWaterfalls['rx-freq-canvas'].length > waterfallLines)
        this.freqWaterfalls['rx-freq-canvas'].shift();

      this.drawWaterfall('rx-freq-canvas', this.freqWaterfalls['rx-freq-canvas'], 800, 2800, sr, fftSize);
      this.rxAnimId = requestAnimationFrame(draw);
    };
    draw();
  },

  drawWaterfall(id, lines, freqStart, freqEnd, sr, fftSize) {
    const canvas = document.getElementById(id);
    if (!canvas || lines.length === 0) return;
    const ctx = canvas.getContext('2d');
    const dpr = devicePixelRatio || 1;
    const w = canvas.width;
    const h = canvas.height;

    ctx.fillStyle = '#080810';
    ctx.fillRect(0, 0, w, h);

    const lineH = h / Math.max(lines.length, 1);

    // Markers
    const markers = [1200, 1500, 1900, 2300];
    ctx.font = `${9 * dpr}px monospace`;
    for (const m of markers) {
      const mx = ((m - freqStart) / (freqEnd - freqStart)) * w;
      ctx.fillStyle = 'rgba(100,100,120,0.3)';
      ctx.fillRect(mx, 0, 0.5 * dpr, h);
      ctx.fillStyle = 'rgba(100,100,120,0.4)';
      ctx.fillText(m + 'Hz', mx + 1 * dpr, 10 * dpr);
    }

    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      const y = h - (li + 1) * lineH;
      for (let xi = 0; xi < line.length; xi++) {
        const val = line[xi] / 255;
        const x = (xi / line.length) * w;
        const bw = Math.max(1, w / line.length);
        const bh = lineH + 0.5;
        const freq = freqStart + (xi / line.length) * (freqEnd - freqStart);
        let hue;
        if (freq < 1200) hue = 240;
        else if (freq < 1500) hue = 200;
        else if (freq < 1900) hue = 140;
        else if (freq < 2300) hue = 60;
        else hue = 0;
        ctx.fillStyle = `hsl(${hue}, 90%, ${10 + 60 * val}%)`;
        ctx.fillRect(x, y, bw, bh);
      }
    }
  }
};

// BOOT
// ============================================================
document.addEventListener('DOMContentLoaded', () => App.init());
